<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f7;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            background-color: #4CAF50;
            padding: 15px;
            border-radius: 5px;
            width: 50%;
            margin: 20px auto;
        }

        form {
            width: 50%;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        input[type="radio"] {
            margin-right: 5px;
        }

        button {
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Student Registration Form</h2>

<form id="registrationForm">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name">

    <label for="roll">Roll Number:</label>
    <input type="text" id="roll" name="roll" placeholder="Enter roll number">

    <label for="department">Department:</label>
    <select id="department" name="department">
        <option value="">Select Department</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Mechanical">Mechanical</option>
        <option value="Electronics">Electronics</option>
        <option value="Civil">Civil</option>
    </select>

    <label>Gender:</label>
    <input type="radio" id="male" name="gender" value="Male"> <label for="male" style="display:inline;">Male</label>
    <input type="radio" id="female" name="gender" value="Female"> <label for="female" style="display:inline;">Female</label>
    <input type="radio" id="other" name="gender" value="Other"> <label for="other" style="display:inline;">Other</label>

    <label for="contact">Contact Number:</label>
    <input type="tel" id="contact" name="contact" placeholder="Enter contact number">

    <button type="submit">Register</button>
    <p id="message" class="success"></p>
</form>

<script>
    document.getElementById("registrationForm").addEventListener("submit", function(e) {
        e.preventDefault(); // Prevent form submission

        // Clear previous message
        const message = document.getElementById("message");
        message.textContent = "";

        // Get form values
        const name = document.getElementById("name").value.trim();
        const roll = document.getElementById("roll").value.trim();
        const department = document.getElementById("department").value;
        const genderElems = document.getElementsByName("gender");
        let gender = "";
        for (const g of genderElems) {
            if (g.checked) gender = g.value;
        }
        const contact = document.getElementById("contact").value.trim();

        // Basic validation
        if (!name || !roll || !department || !gender || !contact) {
            message.textContent = "Please fill all fields.";
            message.style.color = "red";
            return;
        }

        if (!/^\d{10}$/.test(contact)) {
            message.textContent = "Contact number must be 10 digits.";
            message.style.color = "red";
            return;
        }

        // Success message
        message.textContent = `Registration Successful! Welcome, ${name}.`;
        message.style.color = "green";

        // Optionally, you can clear the form
        document.getElementById("registrationForm").reset();
    });
</script>

</body>
</html>
